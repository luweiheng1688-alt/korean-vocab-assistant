<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日韩语</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdn.staticfile.net/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.staticfile.net/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.staticfile.net/babel-standalone/6.26.0/babel.min.js"></script>
    <script src="https://cdn.staticfile.net/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // --- 韩文解析引擎 (纯净版：仅生成罗马音，无中文谐音干扰) ---
        const parseHangul = (text) => {
            const ONSET_ROM = ['g', 'kk', 'n', 'd', 'tt', 'r', 'm', 'b', 'pp', 's', 'ss', '', 'j', 'jj', 'ch', 'k', 't', 'p', 'h'];
            const NUCLEUS_ROM = ['a', 'ae', 'ya', 'yae', 'eo', 'e', 'yeo', 'ye', 'o', 'wa', 'wae', 'oe', 'yo', 'u', 'wo', 'we', 'wi', 'yu', 'eu', 'ui', 'i'];
            const CODA_ROM = ['', 'k', 'kk', 'ks', 'n', 'nj', 'nh', 't', 'l', 'lk', 'lm', 'lb', 'ls', 'lt', 'lp', 'lh', 'm', 'p', 'ps', 's', 'ss', 'ng', 'j', 'ch', 'k', 't', 'p', 'h'];

            let romResult = ''; 
            for (let i = 0; i < text.length; i++) {
                const code = text.charCodeAt(i);
                if (code >= 0xAC00 && code <= 0xD7A3) {
                    const offset = code - 0xAC00;
                    const codaIdx = offset % 28;
                    const nucleusIdx = Math.floor((offset - codaIdx) / 28) % 21;
                    const onsetIdx = Math.floor(Math.floor((offset - codaIdx) / 28) / 21);
                    romResult += ONSET_ROM[onsetIdx] + NUCLEUS_ROM[nucleusIdx] + (codaIdx > 0 ? CODA_ROM[codaIdx] : '') + ' ';
                } else {
                    romResult += text[i]; 
                }
            }
            return { rom: romResult.replace(/\s+/g, ' ').trim() };
        };

        const SEED_WORDS = [
            { id: 1, ko: '안녕하세요', zh: 'Hello', rom: 'annyeonghaseyo' },
            { id: 2, ko: '감사합니다', zh: 'Thank you', rom: 'gamsahamnida' },
            { id: 3, ko: '친구', zh: 'Friend', rom: 'chingu' }
        ];

        // 获取现实世界真实的“今天”天数索引
        const getRealTodayOffset = () => Math.floor(Date.now() / 86400000);

        function App() {
            const [dictionary, setDictionary] = useState(SEED_WORDS);
            const [wordProgress, setWordProgress] = useState({});
            const [isLoaded, setIsLoaded] = useState(false); 
            const [mode, setMode] = useState('home'); 
            const [importMessage, setImportMessage] = useState('');
            const fileInputRef = useRef(null);

            const realToday = getRealTodayOffset();

            // --- 核心：从 Python 加载真实存档 ---
            useEffect(() => {
                const loadFromPython = () => {
                    if (window.pywebview && window.pywebview.api) {
                        window.pywebview.api.load_data().then(savedStr => {
                            if (savedStr) {
                                try {
                                    const parsed = JSON.parse(savedStr);
                                    if (parsed.dictionary) setDictionary(parsed.dictionary);
                                    if (parsed.wordProgress) setWordProgress(parsed.wordProgress);
                                } catch(e) { console.error("解析存档失败", e); }
                            }
                            setIsLoaded(true);
                        });
                    } else { setIsLoaded(true); }
                };
                window.addEventListener('pywebviewready', loadFromPython);
                if (window.pywebview) loadFromPython();
                else setTimeout(() => { if (!isLoaded) setIsLoaded(true); }, 2000);
            }, []);

            // --- 核心：任何数据变化立刻交给 Python 永久保存 ---
            useEffect(() => {
                if (!isLoaded) return;
                const dataToSave = { dictionary, wordProgress };
                if (window.pywebview && window.pywebview.api) {
                    window.pywebview.api.save_data(JSON.stringify(dataToSave));
                }
            }, [dictionary, wordProgress, isLoaded]);

            // --- 派生状态（完全绑定现实世界时间） ---
            const reviewQueue = useMemo(() => {
                return dictionary.filter(word => {
                    const p = wordProgress[word.id];
                    if (!p || p.status !== 'learned') return false;
                    return (p.nextReviewDate < 10000) || (p.nextReviewDate <= realToday);
                });
            }, [dictionary, wordProgress, realToday]);

            const learnedWords = useMemo(() => {
                return dictionary.filter(word => wordProgress[word.id] && wordProgress[word.id].status === 'learned');
            }, [dictionary, wordProgress]);

            const unlearnedWords = useMemo(() => {
                const words = dictionary.filter(word => !wordProgress[word.id]);
                return [...words].sort(() => 0.5 - Math.random());
            }, [dictionary, wordProgress]);

            // 高清真人发音
            const playAudio = (text, e) => {
                if (e) e.stopPropagation();
                const audio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&le=ko`);
                audio.play();
            };

            const markAsLearned = (wordId) => {
                setWordProgress(prev => ({
                    ...prev, [wordId]: { status: 'learned', learnDate: realToday, nextReviewDate: realToday + 1 }
                }));
            };

            const handleReviewResult = (wordId, remembered) => {
                setWordProgress(prev => ({
                    ...prev, [wordId]: { ...prev[wordId], nextReviewDate: remembered ? realToday + 2 : realToday + 1 }
                }));
            };

            // --- 导入功能：原汁原味提取释义（中文英文均可），光速导入并去重保存 ---
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.readAsArrayBuffer(file);
                
                reader.onload = (event) => {
                    try {
                        const data = new Uint8Array(event.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                        let tempWords = [];
                        let totalFound = 0; 
                        const existingWordsSet = new Set(dictionary.map(w => w.ko));
                        const currentBatchSet = new Set();

                        rows.forEach((parts, i) => {
                            if (!parts || parts.length === 0) return;
                            let ko = ''; let meaning = '';

                            for (let j = 0; j < parts.length; j++) {
                                const cleanPart = parts[j] ? String(parts[j]).trim() : '';
                                if (!ko && /[\uAC00-\uD7A3]/.test(cleanPart)) {
                                    ko = cleanPart;
                                    for (let k = j + 1; k < parts.length; k++) {
                                        if (parts[k] && String(parts[k]).trim() !== '') {
                                            meaning = String(parts[k]).trim();
                                            break;
                                        }
                                    }
                                    break;
                                }
                            }

                            if (ko) {
                                totalFound++;
                                if (!existingWordsSet.has(ko) && !currentBatchSet.has(ko)) {
                                    currentBatchSet.add(ko);
                                    const { rom } = parseHangul(ko);
                                    tempWords.push({
                                        id: Date.now() + i + Math.random(), 
                                        ko: ko, 
                                        zh: meaning, // 表格里是啥就是啥，绝不篡改
                                        rom: rom
                                    });
                                }
                            }
                        });

                        if (tempWords.length > 0) {
                            setDictionary(prev => [...prev, ...tempWords]); 
                            setImportMessage(`🎉 成功追加了 ${tempWords.length} 个新单词！已瞬间保存。`);
                            setTimeout(() => setImportMessage(''), 5000);
                        } else if (totalFound > 0) {
                            setImportMessage(`ℹ️ 识别到 ${totalFound} 个单词，但都已存在于词库中。`);
                            setTimeout(() => setImportMessage(''), 5000);
                        } else {
                            setImportMessage("❌ 未检测到韩文，请检查文件。");
                        }
                    } catch (error) {
                        console.error(error);
                        setImportMessage("⚠️ 解析文件失败！请检查表格格式。");
                    }
                    if (fileInputRef.current) fileInputRef.current.value = '';
                };
            };

            if (!isLoaded) {
                return <div className="min-h-screen bg-slate-50 flex items-center justify-center font-bold text-slate-400 animate-pulse">正在读取本地档案...</div>;
            }

            const renderHome = () => (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 text-center relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-10 text-[100px] leading-none">📖</div>
                        <h2 className="text-xl font-bold text-slate-800 mb-2 relative z-10">我的专属词库</h2>
                        <p className="text-slate-500 text-sm mb-6 relative z-10">总容量：{dictionary.length} 词 | 已掌握：{learnedWords.length} 词</p>
                        
                        <div className="flex justify-center gap-8 relative z-10">
                            <div className="text-center">
                                <div className="text-3xl font-black text-blue-500 mb-1">{unlearnedWords.length}</div>
                                <div className="text-xs text-slate-400 font-medium uppercase tracking-wider">待学新词</div>
                            </div>
                            <div className="w-px bg-slate-200"></div>
                            <div className="text-center">
                                <div className={`text-3xl font-black mb-1 ${reviewQueue.length > 0 ? 'text-amber-500' : 'text-emerald-500'}`}>
                                    {reviewQueue.length}
                                </div>
                                <div className="text-xs text-slate-400 font-medium uppercase tracking-wider">今日待复习</div>
                            </div>
                        </div>
                    </div>

                    <div className="grid gap-4">
                        <button onClick={() => setMode('learning')} disabled={unlearnedWords.length === 0} className="flex items-center justify-between bg-blue-500 hover:bg-blue-600 disabled:bg-slate-200 text-white p-5 rounded-2xl transition-all active:scale-95 shadow-md shadow-blue-500/20">
                            <div className="flex items-center gap-4">
                                <div className="bg-white/20 p-3 rounded-xl text-2xl leading-none">🌱</div>
                                <div className="text-left">
                                    <div className="font-bold text-lg">学习新词</div>
                                    <div className="text-blue-100 text-sm">{unlearnedWords.length > 0 ? `有 ${unlearnedWords.length} 个新词等你挑战` : '词库已空，去导入吧！'}</div>
                                </div>
                            </div>
                            <span className="text-xl">➡️</span>
                        </button>

                        <button onClick={() => setMode('testing')} disabled={reviewQueue.length === 0} className="flex items-center justify-between bg-amber-500 hover:bg-amber-600 disabled:bg-slate-200 text-white p-5 rounded-2xl transition-all active:scale-95 shadow-md shadow-amber-500/20">
                            <div className="flex items-center gap-4">
                                <div className="bg-white/20 p-3 rounded-xl text-2xl leading-none">📅</div>
                                <div className="text-left">
                                    <div className="font-bold text-lg">每日复习任务</div>
                                    <div className="text-amber-100 text-sm">{reviewQueue.length > 0 ? `今日有 ${reviewQueue.length} 个单词需巩固` : '今日复习任务已全部完成！'}</div>
                                </div>
                            </div>
                            <span className="text-xl">➡️</span>
                        </button>

                        <button onClick={() => setMode('free_testing')} disabled={learnedWords.length === 0} className="flex items-center justify-between bg-indigo-500 hover:bg-indigo-600 disabled:bg-slate-200 text-white p-5 rounded-2xl transition-all active:scale-95 shadow-md shadow-indigo-500/20 mt-4 border-t-4 border-indigo-400">
                            <div className="flex items-center gap-4">
                                <div className="bg-white/20 p-3 rounded-xl text-2xl leading-none">🔥</div>
                                <div className="text-left">
                                    <div className="font-bold text-lg">无限强化抽查</div>
                                    <div className="text-indigo-100 text-sm">{learnedWords.length > 0 ? `从已学的 ${learnedWords.length} 个词中随时随机抽查` : '先去学习几个新词再来抽查吧'}</div>
                                </div>
                            </div>
                            <span className="text-xl">➡️</span>
                        </button>
                    </div>
                </div>
            );

            const renderSettings = () => (
                <div className="animate-in slide-in-from-right-4 duration-300">
                    <div className="flex items-center mb-6">
                        <button onClick={() => setMode('home')} className="p-2 -ml-2 hover:bg-slate-100 rounded-full text-slate-500"><span style={{fontSize: '24px'}}>⬅️</span></button>
                        <h2 className="text-xl font-bold text-slate-800 ml-2">设置与导入</h2>
                    </div>

                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-6">
                        <h3 className="text-slate-700 font-bold mb-2 flex items-center gap-2"><span style={{fontSize: '18px'}}>📤</span> 从这里导入新的词汇</h3>
                        <p className="text-xs text-slate-500 mb-6 leading-relaxed">导入包含韩语及其释义的 <strong>.xlsx</strong> 表格，这里会自动去除重复词汇哦。<strong className="text-emerald-500">快来导入你想学习的新单词吧！</strong></p>
                        
                        <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl bg-slate-50 hover:bg-slate-100 cursor-pointer transition-colors relative mb-2">
                            <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                <div className="text-3xl mb-2 text-emerald-500">➕</div>
                                <p className="mb-2 text-sm text-slate-600 font-bold">点击这里导入表格</p>
                            </div>
                            <input type="file" className="hidden" accept=".xlsx, .csv" onChange={handleFileUpload} ref={fileInputRef} />
                        </label>
                        {importMessage && <div className={`mt-4 text-sm font-medium p-3 rounded-lg ${importMessage.includes('成功') ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-500'}`}>{importMessage}</div>}
                    </div>

                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                        <h3 className="text-slate-700 font-bold mb-4 flex items-center gap-2"><span style={{fontSize: '18px'}}>🗑️</span> 档案管理</h3>
                        <button onClick={() => { if(window.confirm('⚠️ 确定要彻底清空词库和学习进度吗？这将会删除本地存档文件！')) { setDictionary(SEED_WORDS); setWordProgress({}); setMode('home'); if (window.pywebview) window.pywebview.api.save_data(""); } }} className="w-full py-3 bg-rose-50 hover:bg-rose-100 text-rose-500 font-bold rounded-xl transition-colors">
                            清空所有档案 (恢复初始)
                        </button>
                    </div>
                </div>
            );

            // --- 通用的卡片渲染组件 ---
            const CardComponent = ({ word, modeName, onNext, onResult, isFreeMode = false }) => {
                const [showResult, setShowResult] = useState(false);
                const [options, setOptions] = useState([]);
                const [selectedOption, setSelectedOption] = useState(null);

                useEffect(() => {
                    if (!word) return;
                    const correctOpt = { id: 'correct', text: word.zh, isCorrect: true };
                    
                    // 补丁1：生成干扰项时，不仅排除单词本身，还排除了【意思相同】的其他单词，防止四个选项里出现两个一样的文字！
                    const available = dictionary.filter(w => w.id !== word.id && w.zh !== word.zh);
                    const shuffled = [...available].sort(() => 0.5 - Math.random());
                    const distractors = shuffled.slice(0, 3).map(w => ({ id: w.id, text: w.zh, isCorrect: false }));
                    
                    setOptions([correctOpt, ...distractors].sort(() => 0.5 - Math.random()));
                    setShowResult(false);
                    setSelectedOption(null);
                }, [word, dictionary]);

                const handleOptionClick = (opt) => {
                    if (showResult) return;
                    setSelectedOption(opt);
                    setShowResult(true);
                    playAudio(word.ko); 
                };

                const handleNextClick = () => {
                    if (modeName === 'learning') {
                        markAsLearned(word.id);
                    } else if (modeName === 'testing') {
                        const remembered = selectedOption && selectedOption.isCorrect === true;
                        handleReviewResult(word.id, remembered);
                    }
                    onNext();
                };

                return (
                    <div className="flex flex-col h-[80vh] animate-in slide-in-from-right-4 duration-300">
                        <div className="flex items-center justify-between mb-4">
                            <button onClick={() => setMode('home')} className="p-2 -ml-2 hover:bg-slate-100 rounded-full text-slate-500"><span style={{fontSize: '24px'}}>❌</span></button>
                            <div className={`text-sm font-bold px-3 py-1 rounded-full ${isFreeMode ? 'bg-indigo-50 text-indigo-500' : 'bg-slate-100 text-slate-400'}`}>
                                {isFreeMode ? '无限复习中 🔥' : `剩余任务: ${onResult}`}
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col justify-center w-full max-w-sm mx-auto">
                            <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-8 mb-6 flex flex-col items-center relative">
                                <button onClick={(e) => playAudio(word.ko, e)} className={`absolute top-4 right-4 p-2 rounded-full ${isFreeMode ? 'bg-indigo-50 text-indigo-500 hover:bg-indigo-100' : 'bg-slate-50 text-blue-500 hover:bg-blue-100'}`}><span style={{fontSize: '20px'}}>🔊</span></button>
                                <div className="text-sm font-bold text-slate-400 uppercase mb-2 mt-2">选出正确的含义</div>
                                <div className="text-5xl font-black text-slate-800 my-2 text-center">{word.ko}</div>
                                <div className={`transition-all duration-300 flex flex-col items-center h-6 ${showResult ? 'opacity-100' : 'opacity-0'}`}>
                                    {word.rom && <div className="text-sm font-mono text-slate-400 tracking-wider">[{word.rom}]</div>}
                                </div>
                            </div>

                            <div className="grid gap-3 w-full">
                                {options.map(opt => {
                                    let btnClass = "w-full p-4 rounded-2xl border-2 text-left font-bold text-lg flex items-center justify-between transition-colors ";
                                    let icon = null;
                                    if (!showResult) {
                                        btnClass += isFreeMode ? "bg-white border-slate-200 text-slate-700 hover:bg-indigo-50" : "bg-white border-slate-200 text-slate-700 hover:bg-blue-50";
                                    } else {
                                        if (opt.isCorrect) {
                                            btnClass += "bg-emerald-50 border-emerald-500 text-emerald-600";
                                            icon = <span>✅</span>;
                                        } else if (selectedOption && selectedOption.id === opt.id) {
                                            btnClass += "bg-rose-50 border-rose-500 text-rose-600";
                                            icon = <span>❌</span>;
                                        } else {
                                            btnClass += "bg-white border-slate-100 text-slate-300 opacity-50";
                                        }
                                    }
                                    return <button key={opt.id} onClick={() => handleOptionClick(opt)} disabled={showResult} className={btnClass}><span>{opt.text}</span>{icon}</button>;
                                })}
                            </div>
                        </div>

                        <div className="mt-6">
                            <button onClick={handleNextClick} disabled={!showResult} className={`w-full py-4 rounded-2xl font-bold text-lg transition-all ${showResult ? (isFreeMode ? 'bg-indigo-500 text-white shadow-lg' : 'bg-blue-500 text-white shadow-lg') : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>
                                下一个
                            </button>
                        </div>
                    </div>
                );
            };

            const LearningMode = () => {
                const currentWord = unlearnedWords.length > 0 ? unlearnedWords[0] : null;
                if (!currentWord) return (
                    <div className="flex flex-col items-center justify-center h-[70vh] animate-in fade-in duration-500">
                        <div className="text-[80px] mb-6 animate-bounce">🎉</div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">太棒了！</h2>
                        <button onClick={() => setMode('home')} className="bg-blue-500 text-white px-8 py-4 rounded-2xl font-bold mt-8 shadow-lg">返回主页</button>
                    </div>
                );
                return <CardComponent word={currentWord} modeName="learning" onNext={() => {}} onResult={unlearnedWords.length} />;
            };

            const TestingMode = () => {
                const currentWord = reviewQueue.length > 0 ? reviewQueue[0] : null;
                if (!currentWord) return (
                    <div className="flex flex-col items-center justify-center h-[70vh] animate-in fade-in duration-500">
                        <div className="text-[80px] mb-6">🏆</div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">今日复习完成！</h2>
                        <p className="text-slate-500">所有的每日打卡任务都搞定啦。</p>
                        <button onClick={() => setMode('home')} className="bg-amber-500 text-white px-8 py-4 rounded-2xl font-bold mt-8 shadow-lg">返回主页</button>
                    </div>
                );
                return <CardComponent word={currentWord} modeName="testing" onNext={() => {}} onResult={reviewQueue.length} />;
            };

            const FreeTestingMode = () => {
                const [currentRandomWord, setCurrentRandomWord] = useState(null);

                // 补丁2：防止无限复习时连续两次抽到同一个词
                const getNextRandomWord = (prevWordId = null) => {
                    if (learnedWords.length > 0) {
                        let available = learnedWords;
                        if (learnedWords.length > 1 && prevWordId) {
                            available = learnedWords.filter(w => w.id !== prevWordId);
                        }
                        const randomIdx = Math.floor(Math.random() * available.length);
                        setCurrentRandomWord(available[randomIdx]);
                    }
                };

                useEffect(() => { getNextRandomWord(); }, [learnedWords.length]);

                if (!currentRandomWord) return (
                    <div className="flex flex-col items-center justify-center h-[70vh] animate-in fade-in duration-500">
                        <div className="text-[80px] mb-6">📭</div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">暂无已学单词</h2>
                        <p className="text-slate-500">先去学习几个新词再来抽查吧！</p>
                        <button onClick={() => setMode('home')} className="bg-indigo-500 text-white px-8 py-4 rounded-2xl font-bold mt-8 shadow-lg">返回主页</button>
                    </div>
                );
                
                return <CardComponent word={currentRandomWord} modeName="free_testing" onNext={() => getNextRandomWord(currentRandomWord.id)} isFreeMode={true} />;
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 flex flex-col shadow-2xl relative overflow-hidden">
                    <header className="px-6 pt-12 pb-6 flex items-center justify-between relative z-10">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white font-black">한</div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tight">每日韩语</h1>
                        </div>
                        <button onClick={() => setMode('settings')} className="flex items-center gap-1.5 px-4 py-2 rounded-full font-bold bg-slate-200 text-slate-700 shadow-sm"><span style={{fontSize: '18px'}}>⚙️</span> 设置与档案</button>
                    </header>

                    <main className="flex-1 px-6 pb-8 overflow-y-auto relative z-10">
                        {mode === 'home' && renderHome()}
                        {mode === 'settings' && renderSettings()}
                        {mode === 'learning' && <LearningMode />}
                        {mode === 'testing' && <TestingMode />}
                        {mode === 'free_testing' && <FreeTestingMode />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
